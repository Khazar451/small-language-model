# Model Configuration
model:
  # Architecture type: 'transformer' or 'pretrained'
  type: transformer

  # Transformer architecture settings
  vocab_size: 50257           # Vocabulary size (GPT-2 default)
  d_model: 768                # Embedding dimension
  num_heads: 12               # Number of attention heads
  num_layers: 12              # Number of transformer layers
  d_ff: 3072                  # Feed-forward hidden dimension
  max_seq_length: 1024        # Maximum sequence length
  dropout_rate: 0.1           # Dropout probability
  attention_dropout: 0.1      # Attention-specific dropout

  # Pre-trained model settings (used when type: 'pretrained')
  pretrained_model_name: "gpt2"   # HuggingFace model name
  # Options: "gpt2", "gpt2-medium", "bert-base-uncased",
  #          "distilbert-base-uncased", "gpt2-large"

  # Task-specific head configuration
  task: "text_generation"
  # Options: "text_generation", "question_answering",
  #          "sentiment_analysis", "sequence_classification"

  num_labels: 2               # For classification tasks

  # Positional encoding type
  positional_encoding: "learned"   # "learned" or "sinusoidal"

  # Activation function
  activation: "gelu"          # "gelu" or "relu"

  # Memory optimization flags (see src/model/optimizations.py)
  gradient_checkpointing: false   # Trade compute for memory during training
  use_mixed_precision: false      # Enable float16 mixed precision
  use_quantization: false         # Enable int8 quantization for inference


# ---------------------------------------------------------------------------
# Predefined size configurations
# Uncomment one of the sections below and copy its values into the 'model'
# block above (or load directly via TransformerConfig constants in Python).
# ---------------------------------------------------------------------------

# Small (~30M parameters) — fast experimentation
# model_small:
#   d_model: 256
#   num_heads: 8
#   num_layers: 4
#   d_ff: 1024
#   max_seq_length: 1024

# Medium (~85M parameters)
# model_medium:
#   d_model: 512
#   num_heads: 8
#   num_layers: 6
#   d_ff: 2048
#   max_seq_length: 1024

# Large (~117M parameters) — default above
# model_large:
#   d_model: 768
#   num_heads: 12
#   num_layers: 12
#   d_ff: 3072
#   max_seq_length: 1024

# XL (~345M parameters)
# model_xl:
#   d_model: 1024
#   num_heads: 16
#   num_layers: 24
#   d_ff: 4096
#   max_seq_length: 1024

# 3B (~3.0–3.5B parameters)
# Minimum recommended hardware: 2× 40 GB A100 GPUs
# Memory requirements (training):  ~96 GB GPU RAM with gradient checkpointing + fp16
# Memory requirements (inference): ~12 GB GPU RAM with float16
# model_3b:
#   d_model: 2048
#   num_heads: 32
#   num_layers: 24
#   d_ff: 8192
#   max_seq_length: 2048
#   gradient_checkpointing: true
#   use_mixed_precision: true

# 5B (~4.8–5.2B parameters)
# Minimum recommended hardware: 4× 40 GB A100 GPUs (or 2× 80 GB A100)
# Memory requirements (training):  ~160 GB GPU RAM with gradient checkpointing + fp16
# Memory requirements (inference): ~20 GB GPU RAM with float16
# model_5b:
#   d_model: 2560
#   num_heads: 32
#   num_layers: 32
#   d_ff: 10240
#   max_seq_length: 2048
#   gradient_checkpointing: true
#   use_mixed_precision: true

